[build]
  publish = "dist"
  command = "npm run build"

# ── Domain migration: osmoz.work → osmoz-space.com ───────────────────
[[redirects]]
  from = "https://osmoz.work/*"
  to = "https://osmoz-space.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.osmoz.work/*"
  to = "https://osmoz-space.com/:splat"
  status = 301
  force = true

# ── Legacy / removed URLs ────────────────────────────────────────────
[[redirects]]
  from = "/legal/privacy"
  to = "/politique-de-confidentialite"
  status = 301
  force = true

[[redirects]]
  from = "/legal/terms"
  to = "/mentions-legales"
  status = 301
  force = true

[[redirects]]
  from = "/spaces/patio-osmoz"
  to = "/spaces"
  status = 301
  force = true

# ── SPA catch-all (must be last) ─────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[dev]
  framework = "vite"
  targetPort = 5173
  port = 8888